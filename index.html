<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Algorithmes VD</title>

  <meta name="theme-color" content="#0f766e" />
  <link rel="manifest" href="app.webmanifest" />
  <link rel="apple-touch-icon" href="images/icon-192.png" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  
<div class="top-banner">
    © 2026 Mélanie Weil – Tous droits réservés
  </div>

  <div class="app-shell">

    <header id="topbar" class="topbar">
      <div style="display:flex; align-items:center; justify-content:space-between;">
        <h1 id="mainTitle" style="margin:0;">Algorithmes</h1>

        <button
          id="unlockBtn"
          onclick="unlock()"
          type="button"
          style="background:none; border:none; font-size:20px; cursor:pointer; opacity:0.7;"
        >
          🔒
        </button>
      </div>
    </header>

    <main class="content">

      <!-- ACCUEIL -->
      <section id="screen-home" class="screen active">
        <div class="card">
          <div class="actions-grid">
            <button class="btn btn-primary" data-screen="vd">Algo VD</button>
            <button class="btn btn-star" id="modeBtnTop" data-screen="star">STAR</button>
            <button class="btn btn-autre" data-screen="autre">Autre</button>
            <button class="btn btn-secondary" data-screen="materials">Matériel</button>
          </div>
        </div>

        <div class="card">
          <div class="search-box">
            <span class="search-icon">🔎</span>
            <input
              id="searchInput"
              class="input search-input"
              type="text"
              placeholder="Rechercher un algorithme ou une note..."
            />
          </div>
        </div>

        <button
          onclick="unlock()"
          type="button"
          style="position:fixed; bottom:10px; right:10px; opacity:0.2; z-index:999;"
        >
          🔓
        </button>

        <div id="favoritesSection"></div>
        <div id="homeNotesSection"></div>
        <div id="homeVdList" class="list"></div>
      </section>

      <!-- LISTE ALGO VD -->
      <section id="screen-vd" class="screen">
        <div id="vdList" class="list"></div>
      </section>

      <!-- LISTE STAR -->
      <section id="screen-star" class="screen">
        <div id="starList" class="list"></div>
      </section>

      <!-- MENU CORFA -->
      <section id="screen-corfa" class="screen">
        <div id="corfaList" class="list"></div>
      </section>

      <!-- ALGORITHMES CORFA -->
      <section id="screen-corfa-algos" class="screen">
        <div class="detail-toolbar">
          <button class="round-btn" onclick="showScreen('corfa')" type="button">←</button>
        </div>

        <div id="corfaAlgosList" class="list"></div>
      </section>

      <!-- PHARMACOLOGIE CORFA -->
      <section id="screen-corfa-pharma" class="screen">
        <div class="detail-toolbar">
          <button class="round-btn" onclick="showScreen('corfa')" type="button">←</button>
        </div>

        <div id="corfaPharmaList" class="list"></div>
      </section>

      <!-- LISTE AUTRE -->
      <section id="screen-autre" class="screen">
        <div id="autreList" class="list"></div>
      </section>
      
<section id="screen-resumes" class="screen">
  <div id="resumesList" class="list"></div>
</section>
<section id="screen-theorie" class="screen">

  <div style="margin-bottom:12px;">
    <button
      type="button"
      class="round-btn"
      onclick="showScreen('autre')">
      ← 
    </button>
  </div>

  <div id="theorieList" class="list"></div>

</section>   
<!-- ECRAN ADMIN -->
<section id="screen-admin-menu" class="screen">

  <div class="card">

    <div class="actions-grid">

      <button
        class="btn btn-star"
        onclick="showScreen('star')">
        ⭐ STAR
      </button>

      <button
        class="btn btn-corfa-algos"
        onclick="showScreen('corfa')">
        📖 CORFA
      </button>

    </div>

  </div>

</section>
      <!-- DETAIL COMMUN -->
      <section id="screen-detail" class="screen">
        <div class="detail-toolbar">
          <button id="backBtn" class="round-btn" type="button">←</button>
          <button id="detailFavoriteBtn" class="favorite-btn inactive" type="button">☆</button>
        </div>

        <div id="detailCard" class="card detail-card">
          <div id="detailBadge" class="badge">Chapitre</div>
          <h2 id="detailTitle" class="detail-title">Titre</h2>

          <div id="detailImageWrap" class="image-wrap">
            <img id="detailImage" alt="Algorithme" />
            <div class="placeholder-block">
              <strong>Image non trouvée</strong>
              <p>Vérifie le nom dans <code>app.js</code> et dans le dossier <code>images/</code>.</p>
            </div>
          </div>

          <div id="specialContent"></div>

          <textarea
            id="detailNotes"
            class="textarea"
            placeholder="Ajoute ici tes notes personnelles..."
          ></textarea>
        </div>
      </section>

      <!-- MATERIEL -->
      <section id="screen-materials" class="screen">
         <div class="detail-toolbar">
           <button
             class="round-btn"
             onclick="showScreen('home')"
             type="button">
             🏠  
           </button>
           </div>
        <div id="materialsList" class="list"></div>

        <div class="card">
          <div class="actions-grid actions-grid-2">
            <button id="resetMaterials" class="btn btn-secondary" type="button">
              ⚠️ Remettre à zéro
            </button>
          </div>
        </div>
      </section>

    </main>

    <nav class="bottom-nav">
      <button class="nav-btn active" data-screen="home">Accueil</button>
      <button class="nav-btn" data-screen="vd">Algo VD</button>
      <button class="nav-btn nav-btn-star" id="modeBtn" data-screen="star">STAR</button>
      <button class="nav-btn nav-btn-autre" data-screen="autre">Autre</button>
      <button class="nav-btn" data-screen="materials">Matériel</button>
    </nav>

    <footer style="text-align:center; font-size:12px; opacity:0.6; padding:10px 10px 90px;">
      © 2026 Mélanie Weil – Tous droits réservés
    </footer>

  </div>

  <script src="app.js"></script>
</body>
</html>
