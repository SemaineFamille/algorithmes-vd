<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Algo</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
<div class="app-shell">

  <!-- HEADER -->
  <header id="header" class="topbar">
    <h1 id="mainTitle">Algorithmes</h1>
  </header>

  <main class="content">

    <!-- 🔷 HOME -->
    <section id="screen-home" class="screen active">
      <div class="card">
        <div class="actions-grid">
          <button class="btn btn-primary" data-screen="home">Algo VD</button>
          <button class="btn btn-yellow" data-screen="autre">STAR</button>
          <button class="btn" data-screen="calculator">Calcul</button>
          <button class="btn" data-screen="materials">Matériel</button>
        </div>
      </div>

      <div id="algoList" class="list"></div>
    </section>

    <!-- 🔷 STAR -->
    <section id="screen-autre" class="screen">
      <div id="autreList" class="list"></div>
    </section>

  </main>

  <!-- NAV -->
  <nav class="bottom-nav">
    <button class="nav-btn active" data-screen="home">Accueil</button>
    <button class="nav-btn" data-screen="algo">Algo VD</button>
    <button class="nav-btn star" data-screen="autre">STAR</button>
    <button class="nav-btn" data-screen="materials">Matériel</button>
  </nav>

</div>

<script src="app.js"></script>
</body>
</html>
