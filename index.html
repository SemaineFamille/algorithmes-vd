      <!-- LISTE STAR -->
      <section id="screen-star" class="screen">
        <div id="starList" class="list"></div>
      </section>

      <!-- DETAIL -->
      <section id="screen-detail" class="screen">
        <div class="detail-toolbar">
          <button id="backBtn" class="round-btn" type="button">←</button>
          <button id="detailFavoriteBtn" class="favorite-btn" type="button" aria-label="Favori">☆</button>
        </div>

        <div id="detailCard" class="card detail-card">
          <div id="detailBadge" class="badge">Chapitre</div>
          <h2 id="detailTitle" class="detail-title">Titre</h2>

          <div id="detailImageWrap" class="image-wrap">
            <img id="detailImage" alt="Algorithme" />
            <div id="detailPlaceholder" class="placeholder-block">
              <strong>Image non trouvée</strong>
              <p>Vérifie le nom du fichier dans <code>app.js</code> et dans le dossier <code>images/</code>.</p>
            </div>
          </div>

          <textarea id="detailNotes" class="textarea" placeholder="Ajoute ici tes notes personnelles..."></textarea>
        </div>
      </section>

      <!-- CALCUL -->
      <section id="screen-calculator" class="screen">
        <div class="card">
          <h2 class="section-title">Calcul</h2>
          <input class="input" type="text" placeholder="Contexte / type de calcul" />
          <input class="input" type="text" placeholder="Poids / variable 1" />
          <input class="input" type="text" placeholder="Âge / variable 2" />
          <button class="btn btn-primary full-width" type="button">Lancer</button>
        </div>
      </section>

      <!-- MATERIEL -->
      <section id="screen-materials" class="screen">
        <div id="materialsList" class="list"></div>

        <div class="card">
          <div class="actions-grid single-row">
            <button id="resetMaterials" class="btn btn-secondary" type="button">Remettre à zéro</button>
            <button id="syncMaterials" class="btn btn-primary" type="button">Synchroniser</button>
          </div>
        </div>
      </section>

    </main>

    <nav class="bottom-nav">
      <button class="nav-btn active" data-screen="home">Accueil</button>
      <button class="nav-btn" data-screen="vd">Algo VD</button>
      <button class="nav-btn nav-btn-star" data-screen="star">STAR</button>
      <button class="nav-btn" data-screen="materials">Matériel</button>
    </nav>
  </div>

  <script src="app.js"></script>
